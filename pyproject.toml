[tool.poetry]
name = "backend"
version = "0.1.0"
description = ""
authors = ["Radhakrishna Sanka <rkrishnasanka@gmail.com>"]
readme = "README.md"

packages = [
    { include = "swagger_server" },
    { include = "chatbot" },
]

[tool.poetry.dependencies]
python = ">=3.8.1,<4.0"
connexion = {extras = ["uvicorn"], version = "^2.14.2"}
python-dateutil = "^2.8.2"
setuptools = "^67.8.0"
swagger-ui-bundle = "^0.0.9"
langchain="^0.0.205"
pypdf="^3.10.0"
chromadb="^0.3.29"
tiktoken="^0.4.0"
openai = "^0.27.8"
pymongo = "^4.3.3"
flask-cors = "^3.0.10"
bcrypt = "^4.0.1"
python-jose = "^3.3.0"
flask-jwt-extended = "^4.5.2"
gunicorn = "^21.2.0"

[tool.poetry.group.dev.dependencies]
flask_testing="0.8.0"
coverage="^4.0.3"
nose="^1.3.7"
py="^1.4.31"
randomize="^0.13"
tox="3.20.1"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"

  A: {"Galaxy phones": 0.4, "TVs": 0.3, "refrigerators": 0.3}
  
  Example 4:
  Q: What companies compete with Google?
  Relation: competes with
  Entities: Microsoft; Apple; Facebook; Sundar Pichai; Mountain View
  A: {"Microsoft": 0.4, "Apple": 0.3, "Facebook": 0.3}
  
  Example 5:
  Q: Who founded Amazon and when?
  Relation: founded by
  Entities: Jeff Bezos; 1994; Seattle; AWS; e-commerce
  A: {"Jeff Bezos": 1.0}
  

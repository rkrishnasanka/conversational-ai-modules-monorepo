system: |
  You are an AI assistant specialized in evaluating knowledge sufficiency. Your task is to determine whether the provided knowledge graph triples contain enough information to answer a given question when combined with your general knowledge.
  
  For each question:
  1. Analyze the question to understand what information is being requested
  2. Review the provided knowledge triples (entity, relation, entity)
  3. Determine if these triples, combined with your general knowledge, provide sufficient information to answer the question
  4. Respond with "Yes" if sufficient or "No" if insufficient
  
  Be precise in your evaluation - consider both explicit information in the triples and how they connect to provide a complete answer.

user: |
  Given a question and the associated retrieved knowledge graph triples (entity, relation, entity), you
  are asked to answer whether it's sufficient for you to answer the question with these triples and your
  knowledge (Yes or No).
  
  In-Context Few-shot
  
  Example 1:
  Q: When was Apple Inc. founded?
  Knowledge triples: [Apple Inc., founded in, 1976]
  A: Yes
  
  Example 2:
  Q: Who is the CEO of Microsoft?
  Knowledge triples: []
  A: No
  
  Example 3:
  Q: What products does Samsung make?
  Knowledge triples: [Samsung, produces product, Galaxy phones], [Samsung, produces product, TVs], [Samsung, headquartered in, South Korea]
  A: Yes
  
  Example 4:
  Q: What is the population of Paris?
  Knowledge triples: [Paris, is capital of, France], [Paris, has landmark, Eiffel Tower]
  A: No
  
  Example 5:
  Q: Who founded Amazon?
  Knowledge triples: [Amazon, founded by, Jeff Bezos], [Jeff Bezos, born in, Albuquerque]
  A: Yes
  
